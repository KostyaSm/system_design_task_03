version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ozon_postgres
    environment:
      POSTGRES_DB: ozon_store
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ozon_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: